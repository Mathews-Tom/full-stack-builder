spec_version: "0.1.0"
name: full-stack-builder
version: "1.0.0"
description: >
  End-to-end implementation agent that transforms architecture docs and feature specs into
  production-ready code with tests, API documentation, and security validation.
license: MIT

model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-3-5-20241022
  constraints:
    temperature: 0.4
    max_tokens: 16384

skills: []

runtime:
  max_turns: 50
  timeout: 600

tags:
  - full-stack
  - implementation
  - scaffolding
  - production
  - testing
  - api-docs
  - code-generation
